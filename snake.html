<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #game-container {
            text-align: center;
        }
        #gameCanvas {
            border: 2px solid #333;
            background-color: #fff;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #gameOver {
            font-size: 36px;
            color: red;
            margin-top: 20px;
            display: none;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver">Game Over!</div>
        <button onclick="restartGame()">Restart</button>
    </div>

    <script>
        // 获取画布元素和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // 获取分数显示元素
        const scoreElement = document.getElementById('score');
        // 获取游戏结束显示元素
        const gameOverElement = document.getElementById('gameOver');

        // 游戏变量
        let snake = [{x: 200, y: 200}]; // 蛇的初始位置
        let direction = {x: 0, y: 0}; // 蛇的初始移动方向
        let food = {x: 100, y: 100}; // 食物的初始位置
        let score = 0; // 初始分数
        let gameSpeed = 100; // 游戏速度（毫秒）
        let gameInterval; // 游戏循环定时器

        // 初始化游戏
        function initGame() {
            // 重置蛇的位置和长度
            snake = [{x: 200, y: 200}];
            // 重置移动方向
            direction = {x: 0, y: 0};
            // 生成新的食物位置
            generateFood();
            // 重置分数
            score = 0;
            // 更新分数显示
            scoreElement.textContent = `Score: ${score}`;
            // 隐藏游戏结束提示
            gameOverElement.style.display = 'none';
            // 清除之前的游戏循环
            clearInterval(gameInterval);
            // 启动新的游戏循环
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // 生成随机食物位置
        function generateFood() {
            // 计算画布上可以放置食物的位置（20px为一个单位）
            food.x = Math.floor(Math.random() * (canvas.width / 20)) * 20;
            food.y = Math.floor(Math.random() * (canvas.height / 20)) * 20;
        }

        // 游戏主循环
        function gameLoop() {
            // 计算蛇头的新位置
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            // 将新蛇头添加到蛇的头部
            snake.unshift(head);

            // 检查蛇是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 分数加1
                score++;
                // 更新分数显示
                scoreElement.textContent = `Score: ${score}`;
                // 生成新的食物
                generateFood();
            } else {
                // 如果没吃到食物，移除蛇尾（保持蛇的长度不变）
                snake.pop();
            }

            // 检查碰撞
            if (checkCollision()) {
                // 如果发生碰撞，游戏结束
                gameOver();
                return;
            }

            // 绘制游戏画面
            draw();
        }

        // 检查碰撞
        function checkCollision() {
            const head = snake[0];
            
            // 检查是否撞墙
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return true;
            }
            
            // 检查是否撞到自己
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            // 没有碰撞
            return false;
        }

        // 游戏结束
        function gameOver() {
            // 清除游戏循环
            clearInterval(gameInterval);
            // 显示游戏结束提示
            gameOverElement.style.display = 'block';
        }

        // 重新开始游戏
        function restartGame() {
            // 调用初始化函数重新开始游戏
            initGame();
        }

        // 绘制游戏画面
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制食物（红色方块）
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, 20, 20);
            
            // 绘制蛇（绿色方块）
            ctx.fillStyle = 'green';
            snake.forEach(segment => {
                ctx.fillRect(segment.x, segment.y, 20, 20);
            });
        }

        // 处理键盘输入
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    // 防止蛇向上移动时直接向下移动（避免180度转向）
                    if (direction.y !== 20) direction = {x: 0, y: -20};
                    break;
                case 'ArrowDown':
                    // 防止蛇向下移动时直接向上移动
                    if (direction.y !== -20) direction = {x: 0, y: 20};
                    break;
                case 'ArrowLeft':
                    // 防止蛇向左移动时直接向右移动
                    if (direction.x !== 20) direction = {x: -20, y: 0};
                    break;
                case 'ArrowRight':
                    // 防止蛇向右移动时直接向左移动
                    if (direction.x !== -20) direction = {x: 20, y: 0};
                    break;
            }
        });

        // 启动游戏
        initGame();
    </script>
</body>
</html>
